name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Lint workflows
        uses: reviewdog/action-actionlint@5eaffa19a1991ecc52b11eddcdd57760d1ac7e3d
        with:
          reporter: github-check
          fail_level: error

  lint-source:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint source
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Install Chrome for Testing
        run: |
          npx -y @puppeteer/browsers@3.0.4 install chrome@stable --path "${RUNNER_TEMP}/chrome"
          CHROME_BIN="$(find "${RUNNER_TEMP}/chrome" -type f \( -name chrome -o -name 'Google Chrome for Testing' \) | head -n 1)"
          test -x "${CHROME_BIN}"
          echo "CHROME_BIN=${CHROME_BIN}" >> "${GITHUB_ENV}"

      - name: Validate Chrome extension package
        run: npm run validate:extension

      - name: Run extension flow E2E
        run: npm run test:e2e

      - name: Audit production dependencies
        run: npm audit --omit=dev
