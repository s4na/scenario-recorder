name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint source
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Validate Chrome extension package
        run: npm run validate:extension

      - name: Create extension archive
        run: |
          cd dist
          zip -r "../scenario-recorder-${GITHUB_REF_NAME}.zip" .

      - name: Upload extension archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scenario-recorder-extension
          path: scenario-recorder-${{ github.ref_name }}.zip
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: package-extension
    permissions:
      contents: write
    steps:
      - name: Download extension archive
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: scenario-recorder-extension

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "scenario-recorder-${GITHUB_REF_NAME}.zip" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Scenario Recorder ${GITHUB_REF_NAME}" \
            --notes "Chrome extension package. Extract this zip and load the extracted directory from chrome://extensions."
